<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito de Compras 🛒</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>🛒 Carrito de Compras</h1>

        <div id="productosLista" class="productos-grid">
        </div>

        <div id="carritoLista" class="carrito-items">
        </div>

        <div class="totales">
            <p>Total cantidad: <span id="totalCantidad">0</span></p>
            <p>Total precio: $<span id="totalPrecio">0</span></p>
        </div>

        <button id="limpiarCarrito">Limpiar Carrito</button>
    </div>

    <script src="main.js"></script>
</body>

</html>
